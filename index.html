<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apex</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1a1a28;
    --border: rgba(255,255,255,0.06);
    --gold: #f5a623;
    --gold-dim: rgba(245,166,35,0.15);
    --gold-glow: rgba(245,166,35,0.3);
    --text: #f0f0f5;
    --muted: #6b6b8a;
    --muted2: #3a3a52;
    --danger: #e05252;
    --radius: 12px;
    --radius-lg: 20px;
    --transition: 0.35s cubic-bezier(0.22,1,0.36,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* AMBIENT BACKDROP */
  #ambient-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    filter: blur(80px) saturate(0.4);
    opacity: 0;
    transition: opacity 1.2s ease, background-image 1.2s ease;
    transform: scale(1.1);
  }
  #ambient-bg.active { opacity: 0.18; }
  #ambient-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 0%, var(--bg) 75%);
    pointer-events: none;
  }

  /* NAVBAR */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 48px;
    height: 70px;
    display: flex;
    align-items: center;
    gap: 40px;
    background: linear-gradient(to bottom, rgba(10,10,15,0.95) 0%, transparent 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Outfit', sans-serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
  }
  .nav-logo span { color: var(--text); }
  .nav-tabs {
    display: flex;
    gap: 4px;
    flex: 1;
  }
  .nav-tab {
    padding: 7px 18px;
    border-radius: 50px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    border: none;
    letter-spacing: 0.02em;
  }
  .nav-tab:hover { color: var(--text); background: var(--border); }
  .nav-tab.active { color: var(--gold); background: var(--gold-dim); }

  /* SEARCH BAR */
  .search-wrap {
    position: relative;
    width: 280px;
    flex-shrink: 0;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 9px 18px 9px 40px;
    font-size: 13.5px;
    color: var(--text);
    outline: none;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-dim);
    background: var(--surface);
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    pointer-events: none;
  }
  .search-results {
    position: absolute;
    top: calc(100% + 8px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    z-index: 200;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    display: none;
    max-height: 420px;
    overflow-y: auto;
  }
  .search-results.open { display: block; }
  .search-result-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--surface2); }
  .search-result-item img {
    width: 40px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .search-result-info { flex: 1; min-width: 0; }
  .search-result-title {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .search-result-meta {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 2px;
  }
  .search-result-type {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .search-result-type.movie { background: var(--gold-dim); color: var(--gold); }
  .search-result-type.tv { background: rgba(100,150,255,0.12); color: #7eaaff; }

  /* AI SEARCH */
  .ai-search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 48px 24px;
    margin-top: 86px;
    position: relative;
    z-index: 10;
  }
  .ai-input-wrap {
    flex: 1;
    position: relative;
  }
  .ai-input-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 60px 16px 20px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .ai-input-wrap input::placeholder { color: var(--muted); }
  .ai-input-wrap input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }
  .ai-submit-btn {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    background: var(--gold);
    border: none;
    border-radius: 8px;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0a0a0f;
    font-size: 16px;
    transition: all 0.2s;
  }
  .ai-submit-btn:hover { background: #ffc04a; transform: translateY(-50%) scale(1.05); }
  .ai-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    background: var(--gold-dim);
    padding: 5px 10px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  /* AI RESULTS BANNER */
  #ai-results-banner {
    padding: 0 48px 8px;
    position: relative;
    z-index: 10;
    display: none;
  }
  #ai-results-banner.show { display: block; }
  .ai-banner-inner {
    background: linear-gradient(135deg, rgba(245,166,35,0.08), rgba(245,166,35,0.02));
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .ai-banner-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .ai-banner-text { font-size: 13.5px; color: var(--text); line-height: 1.6; }
  .ai-banner-text strong { color: var(--gold); }

  /* MAIN CONTENT */
  main {
    position: relative;
    z-index: 10;
    padding-top: 16px;
  }

  /* HERO */
  .hero {
    position: relative;
    height: 56vw;
    max-height: 680px;
    min-height: 400px;
    margin-bottom: 40px;
    overflow: hidden;
    border-radius: 0 0 32px 32px;
  }
  .hero-backdrop {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    transition: opacity 0.8s ease;
  }
  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(10,10,15,0.92) 0%,
      rgba(10,10,15,0.5) 50%,
      transparent 100%
    ),
    linear-gradient(
      to top,
      rgba(10,10,15,1) 0%,
      transparent 40%
    );
  }
  .hero-content {
    position: absolute;
    bottom: 60px;
    left: 60px;
    max-width: 520px;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--gold-dim);
    border: 1px solid rgba(245,166,35,0.3);
    color: var(--gold);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 50px;
    margin-bottom: 16px;
  }
  .hero-title {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(32px, 4vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .hero-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .hero-meta-item {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .hero-meta-item.rating { color: var(--gold); font-weight: 600; }
  .hero-overview {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(240,240,245,0.75);
    margin-bottom: 28px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .hero-actions { display: flex; gap: 12px; align-items: center; }
  .btn-play {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--gold);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.01em;
  }
  .btn-play:hover { background: #ffc04a; transform: translateY(-1px); box-shadow: 0 8px 24px var(--gold-glow); }
  .btn-info {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .btn-info:hover { background: rgba(255,255,255,0.16); }

  /* CONTENT ROWS */
  .content-section {
    padding: 0 48px;
    margin-bottom: 48px;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Outfit', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .section-link {
    font-size: 12px;
    color: var(--gold);
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .section-link:hover { text-decoration: underline; }

  /* CARDS ROW */
  .cards-row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 12px;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .cards-row::-webkit-scrollbar { display: none; }

  /* MOVIE CARD */
  .card {
    flex-shrink: 0;
    width: 160px;
    cursor: pointer;
    scroll-snap-align: start;
    transition: transform var(--transition);
    position: relative;
  }
  .card:hover { transform: translateY(-8px) scale(1.03); z-index: 2; }
  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    border-radius: var(--radius);
    object-fit: cover;
    background: var(--surface2);
    display: block;
    transition: box-shadow var(--transition);
    border: 1px solid var(--border);
  }
  .card:hover .card-poster {
    box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1.5px var(--gold);
  }
  .card-overlay {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(to top, rgba(10,10,15,0.95) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.25s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px;
  }
  .card:hover .card-overlay { opacity: 1; }
  .card-play-btn {
    width: 36px; height: 36px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    font-size: 13px;
    color: #0a0a0f;
    transition: transform 0.2s;
  }
  .card-play-btn:hover { transform: scale(1.1); }
  .card-hover-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-hover-meta {
    font-size: 10.5px;
    color: var(--gold);
    margin-top: 2px;
  }
  .card-title {
    margin-top: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-rating {
    color: var(--gold);
    font-size: 11px;
    font-weight: 600;
  }
  .card-type-badge {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    position: absolute;
    top: 8px;
    left: 8px;
  }
  .card-type-badge.tv { background: rgba(126,170,255,0.85); color: #0a0a0f; }

  /* WIDE CARDS (backdrop ratio) */
  .card-wide {
    width: 260px;
  }
  .card-wide .card-poster {
    aspect-ratio: 16/9;
  }

  /* PLAYER MODAL */
  #player-modal {
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(5,5,10,0.97);
    display: none;
    flex-direction: column;
  }
  #player-modal.open { display: flex; }
  .player-topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .player-back {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
  }
  .player-back:hover { background: var(--surface); border-color: var(--gold); color: var(--gold); }
  .player-title-block { flex: 1; }
  .player-title {
    font-family: 'Outfit', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .player-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .player-body {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .player-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .iframe-wrap {
    flex: 1;
    background: #000;
    position: relative;
  }
  .iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .player-sidebar {
    width: 320px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
  }
  .sidebar-info { padding: 20px; }
  .sidebar-title {
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .sidebar-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .sidebar-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--muted);
  }
  .sidebar-badge.gold { background: var(--gold-dim); color: var(--gold); }
  .sidebar-overview {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(240,240,245,0.7);
    margin-bottom: 20px;
  }
  .sidebar-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* TV Episode Selector */
  .season-selector {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .season-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .season-btn.active, .season-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .episode-list { display: flex; flex-direction: column; gap: 4px; }
  .episode-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .episode-item:hover { background: var(--surface2); }
  .episode-item.active { background: var(--gold-dim); border-color: rgba(245,166,35,0.3); }
  .episode-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    width: 26px;
    flex-shrink: 0;
  }
  .episode-item.active .episode-num { color: var(--gold); }
  .episode-name {
    font-size: 12.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .episode-runtime { font-size: 11px; color: var(--muted); margin-left: auto; flex-shrink: 0; }

  /* DETAIL MODAL */
  #detail-modal {
    position: fixed;
    inset: 0;
    z-index: 400;
    background: rgba(5,5,10,0.85);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #detail-modal.open { display: flex; }
  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    max-width: 840px;
    width: 100%;
    max-height: 88vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    animation: modal-in 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.94) translateY(16px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .detail-backdrop {
    width: 100%;
    height: 300px;
    object-fit: cover;
    flex-shrink: 0;
    display: block;
    background: var(--surface2);
  }
  .detail-backdrop-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .detail-backdrop-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--surface) 0%, transparent 50%);
  }
  .detail-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px; height: 36px;
    background: rgba(10,10,15,0.8);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text);
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .detail-close:hover { background: var(--danger); border-color: var(--danger); }
  .detail-body {
    padding: 0 28px 28px;
    overflow-y: auto;
    flex: 1;
  }
  .detail-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 20px;
  }
  .detail-poster {
    width: 110px;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid var(--border);
    flex-shrink: 0;
    margin-top: -60px;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .detail-info { flex: 1; padding-top: 8px; }
  .detail-title {
    font-family: 'Outfit', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .detail-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }
  .detail-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--muted);
  }
  .detail-badge.gold { background: var(--gold-dim); color: var(--gold); }
  .detail-overview {
    font-size: 14px;
    line-height: 1.75;
    color: rgba(240,240,245,0.8);
    margin-bottom: 24px;
  }
  .detail-actions { display: flex; gap: 12px; }

  /* GENRES */
  .genres-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .genre-chip {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 13px;
    border-radius: 50px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* LOADING */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: var(--radius);
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .skeleton-card {
    flex-shrink: 0;
    width: 160px;
  }
  .skeleton-poster {
    width: 100%;
    aspect-ratio: 2/3;
    border-radius: var(--radius);
  }
  .skeleton-line {
    height: 12px;
    margin-top: 10px;
    border-radius: 6px;
  }
  .skeleton-line.short { width: 60%; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13.5px;
    color: var(--text);
    z-index: 9999;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast .toast-icon { margin-right: 8px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 10px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .empty-state-text { font-size: 14px; line-height: 1.6; }

  /* FOOTER CREDIT */
  footer {
    position: relative;
    z-index: 10;
    padding: 24px 48px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 32px;
  }
  footer .footer-left {
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.1em;
    color: var(--gold);
  }
  footer .footer-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
  }
  footer img { height: 20px; opacity: 0.7; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .nav-tabs { display: none; }
    .search-wrap { width: 180px; }
    .ai-search-bar { padding: 0 16px 16px; }
    .content-section { padding: 0 16px; }
    .hero-content { left: 20px; bottom: 30px; max-width: calc(100% - 40px); }
    .hero { height: 70vw; }
    .player-sidebar { display: none; }
    footer { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div id="ambient-bg"></div>

<!-- NAVBAR -->
<nav>

<footer>

  <div class="footer-right">

    <span>·</span>

</footer>

<!-- DETAIL MODAL -->
<div id="detail-modal">
  <div class="detail-card">
    <div class="detail-backdrop-wrap">

      <div class="detail-header">
        <img class="detail-poster" id="detail-poster" src="" alt=""/>
        <div class="detail-info">

          <div class="detail-meta-row" id="detail-meta-row"></div>
          <div class="detail-actions">
            <button class="btn-play" id="detail-play-btn">▶ Play Now</button>
            <button class="btn-info" onclick="closeDetail()">✕ Close</button>
          </div>

      <div class="genres-row" id="detail-genres"></div>

</div>

<!-- PLAYER MODAL -->
<div id="player-modal">

<script>
const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIzY2NiM2I5ZmM4Y2ZkOGEzYjBmMjcxZDVmNTE3NjhjNCIsIm5iZiI6MTc4MTQ2MjMyNy4wMzQsInN1YiI6IjZhMmVmNTM3ZTUwYTI1YzdmZDRhYzU1NiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.GrOZs6qonJrskxFjuK_WDkfI0QWkOBbDUSq3-vzhnBM';
const TMDB_BASE = 'https://api.themoviedb.org/3';
const IMG_BASE = 'https://image.tmdb.org/t/p/';
const VIDKING = 'https://www.vidking.net/embed';
const ANTHROPIC_API = 'https://api.anthropic.com/v1/messages';

let currentTab = 'home';
let currentTVItem = null;
let currentSeason = 1;
let currentEpisode = 1;
let heroItems = [];
let heroIndex = 0;
let heroTimer = null;

// ─── TMDB FETCH ───
async function tmdb(endpoint, params = {}) {
  const url = new URL(`${TMDB_BASE}${endpoint}`);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url, {
    headers: { Authorization: `Bearer ${TMDB_TOKEN}`, 'Content-Type': 'application/json' }
  });
  return res.json();
}

// ─── INIT ───
async function init() {
  loadHome();
  setupSearch();
  setupAiSearch();
  document.getElementById('ai-search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') runAiSearch();
  });
}

// ─── HOME ───
async function loadHome() {
  const container = document.getElementById('rows-container');
  container.innerHTML = '';

  const [trending, popular_movies, popular_tv, top_rated, upcoming, action] = await Promise.all([
    tmdb('/trending/all/week'),
    tmdb('/movie/popular'),
    tmdb('/tv/popular'),
    tmdb('/movie/top_rated'),
    tmdb('/movie/upcoming'),
    tmdb('/discover/movie', { with_genres: '28', sort_by: 'popularity.desc' })
  ]);

  // Set hero
  heroItems = trending.results.filter(i => i.backdrop_path).slice(0, 6);
  heroIndex = 0;
  setHero(heroItems[0]);
  clearInterval(heroTimer);
  heroTimer = setInterval(() => {
    heroIndex = (heroIndex + 1) % heroItems.length;
    setHero(heroItems[heroIndex]);
  }, 7000);

  // Render rows
  renderRow('🔥 Trending This Week', trending.results, container, true);
  renderRow('🎬 Popular Movies', popular_movies.results, container);
  renderRow('📺 Popular TV Shows', popular_tv.results, container);
  renderRow('⭐ Top Rated Films', top_rated.results, container);
  renderRow('🆕 Coming Soon', upcoming.results, container);
  renderRow('💥 Action & Adventure', action.results, container);
}

// ─── SET HERO ───
function setHero(item) {
  if (!item) return;
  const title = item.title || item.name;
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  const type = item.media_type || (item.title ? 'movie' : 'tv');
  const rating = item.vote_average?.toFixed(1);
  const overview = item.overview;
  const backdrop = item.backdrop_path ? `${IMG_BASE}original${item.backdrop_path}` : '';

  // Ambient BG
  const amb = document.getElementById('ambient-bg');
  amb.style.backgroundImage = backdrop ? `url(${backdrop})` : '';
  amb.classList.toggle('active', !!backdrop);

  document.getElementById('hero-backdrop').style.backgroundImage = backdrop ? `url(${backdrop})` : '';

  document.getElementById('hero-content').innerHTML = `
    <div class="hero-badge">★ ${rating} &nbsp;·&nbsp; ${type === 'tv' ? 'Series' : 'Film'}</div>
    <div class="hero-title">${title}</div>
    <div class="hero-meta">
      <span class="hero-meta-item">${year}</span>
      ${item.original_language ? `<span class="hero-meta-item">🌐 ${item.original_language.toUpperCase()}</span>` : ''}
      ${item.vote_count ? `<span class="hero-meta-item">👥 ${(item.vote_count/1000).toFixed(1)}k votes</span>` : ''}
    </div>
    <p class="hero-overview">${overview || ''}</p>
    <div class="hero-actions">
      <button class="btn-play" onclick='playItem(${JSON.stringify(item).replace(/'/g,"&#39;")})'>▶ Play Now</button>
      <button class="btn-info" onclick='showDetail(${JSON.stringify(item).replace(/'/g,"&#39;")})'>ℹ More Info</button>
    </div>
  `;
}

// ─── RENDER ROW ───
function renderRow(title, items, container, wide = false) {
  if (!items || !items.length) return;
  const section = document.createElement('div');
  section.className = 'content-section';
  section.innerHTML = `
    <div class="section-header">
      <div class="section-title">${title}</div>
    </div>
    <div class="cards-row" id="row-${Math.random().toString(36).slice(2)}">
      ${items.map(item => renderCard(item, wide)).join('')}
    </div>
  `;
  container.appendChild(section);
}

function renderCard(item, wide = false) {
  const title = item.title || item.name;
  const type = item.media_type || (item.title ? 'movie' : 'tv');
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  const rating = item.vote_average?.toFixed(1) || '';
  const poster = item.poster_path ? `${IMG_BASE}w342${item.poster_path}` : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300"><rect fill="%231a1a28" width="200" height="300"/><text fill="%236b6b8a" font-size="12" x="50%" y="50%" text-anchor="middle">No Image</text></svg>';
  const backdrop = item.backdrop_path ? `${IMG_BASE}w500${item.backdrop_path}` : poster;
  const imgSrc = wide ? backdrop : poster;
  const safeItem = JSON.stringify(item).replace(/'/g,"&#39;").replace(/"/g,'&quot;');

  return `
    <div class="card ${wide ? 'card-wide' : ''}"
      onmouseenter="hoverCard('${item.backdrop_path || item.poster_path || ''}')"
      onclick='showDetail(JSON.parse(this.dataset.item))'
      data-item="${safeItem}">
      ${type === 'tv' ? '<span class="card-type-badge tv">TV</span>' : ''}
      <img class="card-poster" src="${imgSrc}" alt="${title}" loading="lazy"
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22><rect fill=%22%231a1a28%22 width=%22200%22 height=%22300%22/><text fill=%22%236b6b8a%22 font-size=%2212%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22>No Image</text></svg>'"/>
      <div class="card-overlay">
        <div class="card-play-btn">▶</div>
        <div class="card-hover-title">${title}</div>
        ${rating ? `<div class="card-hover-meta">★ ${rating}</div>` : ''}
      </div>
      <div class="card-title">${title}</div>
      <div class="card-meta">
        <span>${year}</span>
        ${rating ? `<span class="card-rating">★ ${rating}</span>` : ''}
      </div>
    </div>
  `;
}

// ─── AMBIENT ON HOVER ───
function hoverCard(path) {
  if (!path) return;
  const amb = document.getElementById('ambient-bg');
  const url = `${IMG_BASE}w780${path}`;
  amb.style.backgroundImage = `url(${url})`;
  amb.classList.add('active');
}

// ─── TABS ───
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const container = document.getElementById('rows-container');
  container.innerHTML = '<div class="content-section">' + skeletonRow() + skeletonRow() + '</div>';
  document.getElementById('hero-section').style.display = tab === 'home' || tab === 'trending' ? '' : 'none';
  clearInterval(heroTimer);

  if (tab === 'home') { loadHome(); return; }

  const fetches = {
    movies: [
      ['/movie/popular', 'Popular Movies'],
      ['/movie/top_rated', 'Top Rated'],
      ['/movie/now_playing', 'Now Playing'],
      ['/movie/upcoming', 'Coming Soon'],
      ['/discover/movie', 'Action', { with_genres: '28' }],
      ['/discover/movie', 'Drama', { with_genres: '18' }],
      ['/discover/movie', 'Thriller', { with_genres: '53' }],
      ['/discover/movie', 'Sci-Fi', { with_genres: '878' }],
    ],
    tv: [
      ['/tv/popular', 'Popular Shows'],
      ['/tv/top_rated', 'Top Rated'],
      ['/tv/on_the_air', 'On Air Now'],
      ['/discover/tv', 'Drama', { with_genres: '18' }],
      ['/discover/tv', 'Crime', { with_genres: '80' }],
      ['/discover/tv', 'Sci-Fi & Fantasy', { with_genres: '10765' }],
    ],
    trending: [
      ['/trending/all/day', 'Trending Today'],
      ['/trending/movie/week', 'Trending Movies'],
      ['/trending/tv/week', 'Trending Shows'],
    ]
  };

  const rows = fetches[tab] || [];
  container.innerHTML = '';

  const heroMap = { movies: '/movie/popular', tv: '/tv/popular', trending: '/trending/all/day' };
  if (heroMap[tab]) {
    tmdb(heroMap[tab]).then(d => {
      heroItems = (d.results || []).filter(i => i.backdrop_path).slice(0, 6);
      heroIndex = 0;
      setHero(heroItems[0]);
      heroTimer = setInterval(() => {
        heroIndex = (heroIndex + 1) % heroItems.length;
        setHero(heroItems[heroIndex]);
      }, 7000);
    });
  }

  Promise.all(rows.map(([ep, label, params]) => tmdb(ep, params || {}).then(d => ({label, results: d.results}))))
    .then(sections => {
      container.innerHTML = '';
      sections.forEach(({label, results}) => renderRow(label, results, container));
    });
}

function skeletonRow() {
  return `<div class="section-header"><div class="skeleton skeleton-line" style="width:200px;height:20px;"></div></div>
  <div class="cards-row">${Array(7).fill(0).map(() => `
    <div class="skeleton-card">
      <div class="skeleton skeleton-poster"></div>
      <div class="skeleton skeleton-line"></div>
      <div class="skeleton skeleton-line short"></div>
    </div>`).join('')}</div>`;
}

// ─── SEARCH ───
function setupSearch() {
  const input = document.getElementById('nav-search');
  const results = document.getElementById('search-results');
  let debounce;
  input.addEventListener('input', () => {
    clearTimeout(debounce);
    const q = input.value.trim();
    if (!q) { results.classList.remove('open'); return; }
    debounce = setTimeout(() => doSearch(q), 320);
  });
  input.addEventListener('focus', () => { if (input.value.trim()) results.classList.add('open'); });
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) results.classList.remove('open');
  });
}

async function doSearch(q) {
  const results = document.getElementById('search-results');
  results.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:13px;">Searching...</div>';
  results.classList.add('open');
  const data = await tmdb('/search/multi', { query: q, page: 1 });
  const items = (data.results || []).filter(i => i.media_type !== 'person').slice(0, 8);
  if (!items.length) {
    results.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:13px;">No results found.</div>';
    return;
  }
  results.innerHTML = items.map(item => {
    const title = item.title || item.name;
    const type = item.media_type;
    const year = (item.release_date || item.first_air_date || '').slice(0,4);
    const poster = item.poster_path ? `${IMG_BASE}w92${item.poster_path}` : '';
    const safeItem = JSON.stringify(item).replace(/'/g,"&#39;").replace(/"/g,'&quot;');
    return `<div class="search-result-item" onclick='selectSearchResult(JSON.parse(this.dataset.item))' data-item="${safeItem}">
      <img src="${poster}" onerror="this.style.display='none'" alt=""/>
      <div class="search-result-info">
        <div class="search-result-title">${title}</div>
        <div class="search-result-meta">${year}${year && item.vote_average ? ' · ' : ''}${item.vote_average ? '★ ' + item.vote_average.toFixed(1) : ''}</div>
      </div>
      <span class="search-result-type ${type}">${type === 'tv' ? 'TV' : 'Film'}</span>
    </div>`;
  }).join('');
}

function selectSearchResult(item) {
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('nav-search').value = '';
  showDetail(item);
}

function navigateTo(page) {
  if (page === 'home') {
    setTab('home', document.querySelector('.nav-tab'));
  }
}

// ─── DETAIL MODAL ───
async function showDetail(item) {
  const type = item.media_type || (item.title ? 'movie' : 'tv');
  const title = item.title || item.name;
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  const rating = item.vote_average?.toFixed(1) || 'N/A';

  document.getElementById('detail-backdrop').src = item.backdrop_path
    ? `${IMG_BASE}w1280${item.backdrop_path}` : '';
  document.getElementById('detail-poster').src = item.poster_path
    ? `${IMG_BASE}w342${item.poster_path}` : '';
  document.getElementById('detail-title').textContent = title;
  document.getElementById('detail-overview').textContent = item.overview || 'No description available.';

  document.getElementById('detail-meta-row').innerHTML = `
    <span class="detail-badge gold">★ ${rating}</span>
    <span class="detail-badge">${year}</span>
    <span class="detail-badge">${type === 'tv' ? '📺 Series' : '🎬 Movie'}</span>
    ${item.original_language ? `<span class="detail-badge">${item.original_language.toUpperCase()}</span>` : ''}
  `;

  // Fetch genres
  const details = await tmdb(`/${type}/${item.id}`);
  const genres = details.genres || [];
  document.getElementById('detail-genres').innerHTML = genres.map(g =>
    `<span class="genre-chip">${g.name}</span>`
  ).join('');

  document.getElementById('detail-play-btn').onclick = () => {
    closeDetail();
    playItem(item);
  };

  document.getElementById('detail-modal').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-modal').classList.remove('open');
}

// ─── PLAYER ───
async function playItem(item) {
  const type = item.media_type || (item.title ? 'movie' : 'tv');
  const title = item.title || item.name;

  document.getElementById('player-title').textContent = title;
  document.getElementById('sidebar-title').textContent = title;
  document.getElementById('sidebar-overview').textContent = item.overview || '';
  document.getElementById('sidebar-poster').src = item.poster_path
    ? `${IMG_BASE}w342${item.poster_path}` : '';

  const rating = item.vote_average?.toFixed(1) || 'N/A';
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  document.getElementById('sidebar-meta').innerHTML = `
    <span class="sidebar-badge gold">★ ${rating}</span>
    <span class="sidebar-badge">${year}</span>
    <span class="sidebar-badge">${type === 'tv' ? 'Series' : 'Movie'}</span>
  `;

  if (type === 'movie') {
    document.getElementById('player-subtitle').textContent = 'Movie';
    loadMoviePlayer(item.id);
    document.getElementById('tv-controls').innerHTML = '';
  } else {
    currentTVItem = item;
    currentSeason = 1;
    currentEpisode = 1;
    await loadTVPlayer(item.id, 1, 1);
    await buildTVControls(item.id);
  }

  document.getElementById('player-modal').classList.add('open');
}

function loadMoviePlayer(id) {
  document.getElementById('player-iframe').src = `${VIDKING}/movie/${id}?autoPlay=true&color=f5a623`;
}

async function loadTVPlayer(id, season, episode) {
  currentSeason = season;
  currentEpisode = episode;
  document.getElementById('player-iframe').src = `${VIDKING}/tv/${id}/${season}/${episode}?autoPlay=true&color=f5a623&nextEpisode=true&episodeSelector=true`;
  document.getElementById('player-subtitle').textContent = `Season ${season}, Episode ${episode}`;
}

async function buildTVControls(id) {
  const tvEl = document.getElementById('tv-controls');
  tvEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0;">Loading episodes...</div>';

  const details = await tmdb(`/tv/${id}`);
  const seasons = (details.seasons || []).filter(s => s.season_number > 0);

  const renderSeasonEpisodes = async (seasonNum) => {
    const seasonData = await tmdb(`/tv/${id}/season/${seasonNum}`);
    const episodes = seasonData.episodes || [];
    tvEl.innerHTML = `
      <div class="sidebar-section-label">Seasons</div>
      <div class="season-selector">
        ${seasons.map(s => `<button class="season-btn ${s.season_number === seasonNum ? 'active' : ''}"
          onclick="switchSeason(${id}, ${s.season_number}, this)">${s.season_number}</button>`).join('')}
      </div>
      <div class="sidebar-section-label">Episodes</div>
      <div class="episode-list">
        ${episodes.map(ep => `
          <div class="episode-item ${ep.episode_number === currentEpisode && seasonNum === currentSeason ? 'active' : ''}"
            onclick="switchEpisode(${id}, ${seasonNum}, ${ep.episode_number}, this)">
            <span class="episode-num">E${ep.episode_number}</span>
            <span class="episode-name">${ep.name || 'Episode ' + ep.episode_number}</span>
            ${ep.runtime ? `<span class="episode-runtime">${ep.runtime}m</span>` : ''}
          </div>`).join('')}
      </div>
    `;
  };

  window.switchSeason = async (id, seasonNum, btn) => {
    document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSeason = seasonNum;
    currentEpisode = 1;
    await renderSeasonEpisodes(seasonNum);
    loadTVPlayer(id, seasonNum, 1);
  };

  window.switchEpisode = (id, season, episode, el) => {
    document.querySelectorAll('.episode-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    loadTVPlayer(id, season, episode);
  };

  renderSeasonEpisodes(1);
}

function closePlayer() {
  document.getElementById('player-modal').classList.remove('open');
  document.getElementById('player-iframe').src = '';
}

// ─── AI SEARCH ───
function setupAiSearch() {
  // handled inline
}

async function runAiSearch() {
  const input = document.getElementById('ai-search-input');
  const query = input.value.trim();
  if (!query) return;

  const banner = document.getElementById('ai-results-banner');
  const bannerText = document.getElementById('ai-banner-text');
  bannerText.innerHTML = '<em style="color:var(--muted)">✦ Thinking...</em>';
  banner.classList.add('show');

  // Ask Claude to extract search intent
  try {
    const res = await fetch(ANTHROPIC_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `You are a movie and TV show discovery assistant for a streaming platform called Apex.
The user typed: "${query}"

Your job:
1. Understand what they want (genre, mood, era, similarity to other titles, etc.)
2. Return a JSON object with:
   - "searchTerms": array of 2-3 TMDB search query strings to try (e.g. ["mind bending sci fi", "space opera thriller"])
   - "mediaType": "movie", "tv", or "both"
   - "explanation": 1 sentence explaining what you understood and what you'll show them (friendly, concise)

Respond with ONLY valid JSON, no markdown, no backticks.`
        }]
      })
    });

    const data = await res.json();
    const text = data.content?.map(c => c.text || '').join('') || '{}';
    let parsed;
    try { parsed = JSON.parse(text.replace(/```json|```/g,'')); }
    catch { parsed = { searchTerms: [query], mediaType: 'both', explanation: 'Searching for: ' + query }; }

    bannerText.innerHTML = `<strong>✦ Apex AI:</strong> ${parsed.explanation || 'Searching...'}`;

    // Search TMDB with extracted terms
    const searches = await Promise.all(
      (parsed.searchTerms || [query]).slice(0, 3).map(term => {
        if (parsed.mediaType === 'movie') return tmdb('/search/movie', { query: term });
        if (parsed.mediaType === 'tv') return tmdb('/search/tv', { query: term });
        return tmdb('/search/multi', { query: term });
      })
    );

    const seen = new Set();
    const results = searches.flatMap(s => s.results || [])
      .filter(item => {
        if (item.media_type === 'person') return false;
        if (seen.has(item.id)) return false;
        seen.add(item.id);
        return true;
      })
      .sort((a, b) => b.vote_average - a.vote_average)
      .slice(0, 20);

    // Inject AI results row
    const container = document.getElementById('rows-container');
    const existing = document.getElementById('ai-results-row');
    if (existing) existing.remove();

    const section = document.createElement('div');
    section.className = 'content-section';
    section.id = 'ai-results-row';
    section.innerHTML = `
      <div class="section-header">
        <div class="section-title">✦ AI Results for "${query}"</div>
        <span class="section-link" onclick="clearAiResults()">Clear</span>
      </div>
      <div class="cards-row">
        ${results.map(item => renderCard(item)).join('')}
      </div>
    `;
    container.prepend(section);
    section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  } catch (err) {
    bannerText.innerHTML = `<strong style="color:var(--danger)">Error:</strong> Could not reach AI. Showing direct search results.`;
    const data = await tmdb('/search/multi', { query });
    const container = document.getElementById('rows-container');
    const section = document.createElement('div');
    section.className = 'content-section';
    section.id = 'ai-results-row';
    section.innerHTML = `<div class="section-header"><div class="section-title">Search: "${query}"</div></div>
      <div class="cards-row">${(data.results || []).filter(i=>i.media_type!=='person').map(i=>renderCard(i)).join('')}</div>`;
    container.prepend(section);
  }
}

function clearAiResults() {
  const el = document.getElementById('ai-results-row');
  if (el) el.remove();
  document.getElementById('ai-results-banner').classList.remove('show');
  document.getElementById('ai-search-input').value = '';
}

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── KEYBOARD ───
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closePlayer();
    closeDetail();
  }
});

// ─── START ───
init();
</script>
